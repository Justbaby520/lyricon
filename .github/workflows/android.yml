name: Android CI

on:
  workflow_run:
    workflows: ["Upstream Sync"]
    types: [completed]

  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  # 关键：统一入口 + 防空字符串
  BUILD_TYPE: ${{ github.event.inputs.build_type != '' && github.event.inputs.build_type || 'release' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 删除 Gradle 守护进程 JDK 配置
        run: |
          echo "检查并删除 Gradle 守护进程 JDK 配置..."
          if [ -f "gradle/gradle-daemon-jvm.properties" ]; then
            rm -f gradle/gradle-daemon-jvm.properties
            echo "✅ 已删除"
          else
            echo "✅ 无需删除"
          fi

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew

      - name: 修正 Gradle 配置文件
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i 's/-XX:+CMSClassUnloadingEnabled//g' gradle.properties
            sed -i 's/-Xmx8g/-Xmx4g/g' gradle.properties
            sed -i 's/-XX:MaxMetaspaceSize=2g/-XX:MaxMetaspaceSize=1g/g' gradle.properties
            echo "✅ gradle.properties 已优化"
          fi

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 解码签名密钥
        if: env.BUILD_TYPE == 'release'
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          echo "✅ 签名文件已生成"

      - name: 构建 APK
        run: |
          echo "当前构建类型: $BUILD_TYPE"

          if [ "$BUILD_TYPE" == "debug" ]; then
            ./gradlew :lyricon:assembleDebug
          else
            ./gradlew :lyricon:assembleRelease
          fi
        env:
          RELEASE_STORE_FILE: ../release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 列出 APK
        run: |
          echo "====== APK 文件 ======"
          find lyricon/build/outputs/apk -name "*.apk"

      - name: 上传 APK（Artifacts）
        uses: actions/upload-artifact@v7
        with:
          name: lyricon-${{ env.BUILD_TYPE }}-apk
          path: lyricon/build/outputs/apk/${{ env.BUILD_TYPE }}/lyricon-*${{ env.BUILD_TYPE }}.apk
          if-no-files-found: warn

      - name: 上传到 Release
        run: |
          TAG="ci-build"

          gh release view "$TAG" >/dev/null 2>&1 || \
          gh release create "$TAG" -t "CI Build" -n "Auto build"

          gh release upload "$TAG" lyricon/build/outputs/apk/${BUILD_TYPE}/lyricon-*${BUILD_TYPE}.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理敏感文件
        if: env.BUILD_TYPE == 'release'
        run: |
          rm -f release.jks
          echo "✅ 已清理签名文件"

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: 构建结果摘要
        run: |
          echo "## 构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建类型**: ${{ env.BUILD_TYPE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建编号**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK 已上传到 Artifacts 和 Release。" >> $GITHUB_STEP_SUMMARY
